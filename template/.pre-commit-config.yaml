repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.2
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: check-all
        name: check all python code
        entry: make check-all
        language: system
        pass_filenames: false
